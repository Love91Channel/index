<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Let me in your heart | Development b1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 20% 30%, #0b0f1c, #03050b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Rajdhani', 'Segoe UI', 'PingFang SC', monospace;
            padding: 20px;
            position: relative;
            overflow-x: auto;
        }

        .cyber-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .cyber-bg::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(0, 255, 255, 0.08), transparent 70%);
            animation: rotateHue 20s infinite linear;
        }
        .cyber-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,255,255,0.02) 0px, rgba(0,255,255,0.02) 2px, transparent 2px, transparent 12px);
            animation: scanMove 8s linear infinite;
        }
        @keyframes rotateHue {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes scanMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 30px; }
        }

        /* 漂浮粒子动画 */
        .floating-particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: cyan;
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(1px);
            animation: float 15s infinite linear;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        /* 去掉了边框闪烁动画，保留其他样式 */
        .board-area {
            position: relative;
            background: #0a0f1a;
            border-radius: 2rem;
            padding: 0.8rem;
            box-shadow: 0 0 0 2px #0ff3, 0 20px 35px rgba(0, 0, 0, 0.5);
            /* 移除 animation: borderGlow ... */
        }

        /* 原有其他动画 */
        @keyframes shakeCanvas {
            0% { transform: translate(0, 0); }
            25% { transform: translate(4px, 3px); }
            50% { transform: translate(-3px, -2px); }
            75% { transform: translate(2px, -3px); }
            100% { transform: translate(0, 0); }
        }
        .shake-effect {
            animation: shakeCanvas 0.15s ease-in-out 0s 3;
        }

        @keyframes redPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); border-color: red; }
            100% { box-shadow: 0 0 0 25px rgba(255, 0, 0, 0); border-color: cyan; }
        }
        .check-pulse {
            animation: redPulse 0.6s ease-out 2;
        }

        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,200,0.95) 0%, rgba(0,255,255,0.6) 100%);
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.08s;
        }

        .game-container {
            background: rgba(4, 8, 18, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 1.2rem 1.8rem 1.8rem 1.8rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(0, 255, 255, 0.4);
            border: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 2;
            position: relative;
        }
        .game-container::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 3rem;
            padding: 2px;
            background: linear-gradient(125deg, cyan, #ff00cc, #ffcc00);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.7;
        }

        .chess-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 1.8rem;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 1rem;
            box-shadow: 0 0 0 1px cyan, 0 10px 30px black;
            cursor: pointer;
            width: 100%;
            height: auto;
        }
        .flip-btn {
            background: #0f1422dd;
            border: 1px solid cyan;
            border-radius: 40px;
            padding: 6px 12px;
            margin-top: 10px;
            font-size: 0.7rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Orbitron', monospace;
            color: #0ff;
            letter-spacing: 2px;
        }
        .flip-btn:hover {
            background: cyan;
            color: #000;
            box-shadow: 0 0 15px cyan;
        }

        .info-panel {
            background: rgba(2, 6, 16, 0.88);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.2rem;
            width: 370px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.6);
        }

        .timer-card {
            background: #03060e;
            border-radius: 1.5rem;
            padding: 0.6rem;
            margin-bottom: 0.8rem;
            text-align: center;
            border: 1px solid #2d4b6e;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .timer-card.active {
            border-color: cyan;
            box-shadow: 0 0 12px cyan, inset 0 0 4px rgba(0, 255, 255, 0.3);
            background: linear-gradient(145deg, #0b1424, #02050c);
        }
        .avatar-area {
            position: relative;
            cursor: pointer;
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: #16213e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 2px solid cyan;
            box-shadow: 0 0 6px cyan;
            transition: 0.1s;
        }
        .avatar:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 8px cyan);
        }
        .player-info {
            flex: 1;
            text-align: left;
        }
        .player-name {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .edit-icon {
            font-size: 0.7rem;
            background: #1a2a3f;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            color: cyan;
        }
        .edit-icon:hover {
            background: cyan;
            color: #000;
            box-shadow: 0 0 8px cyan;
        }
        .red-name { color: #ff4d7a; text-shadow: 0 0 3px #ff1a4f; }
        .black-name { color: #2bd1fc; text-shadow: 0 0 3px #00a6ff; }
        .timer {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 4px;
            letter-spacing: 3px;
            background: #000000aa;
            display: inline-block;
            padding: 0.1rem 0.6rem;
            border-radius: 2rem;
            color: #0ff;
            text-shadow: 0 0 6px cyan;
        }

        .turn-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #030917cc;
            border-radius: 3rem;
            margin: 10px 0;
            padding: 5px 15px;
            border: 1px solid cyan;
        }
        .turn-badge {
            background: linear-gradient(95deg, cyan, #4a6eff);
            color: #010101;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 900;
            box-shadow: 0 0 10px cyan;
        }

        .winrate-section {
            background: #02060ec9;
            border-radius: 1.2rem;
            padding: 0.6rem;
            margin: 0.8rem 0;
            border: 1px solid cyan;
        }
        .progress-bar-bg {
            background: #101826;
            border-radius: 40px;
            height: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, #ff4d6d, #ffb347);
            border-radius: 40px;
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 0 0 6px #ff7766;
        }
        .winrate-text {
            text-align: center;
            margin-top: 6px;
            font-size: 0.65rem;
            color: #b3f0ff;
            font-family: 'Orbitron', monospace;
        }

        .move-history {
            background: #030917cc;
            border-radius: 1rem;
            padding: 6px;
            margin: 8px 0;
            border: 1px solid cyan;
            max-height: 80px;
            overflow-y: auto;
        }
        .history-title {
            font-size: 0.6rem;
            color: cyan;
            text-align: center;
            margin-bottom: 4px;
        }
        .history-list {
            font-size: 0.55rem;
            font-family: monospace;
            color: #aaf;
            line-height: 1.3;
            padding-left: 8px;
        }

        .save-slots {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin: 8px 0;
        }
        .slot-card {
            background: #0a1020cc;
            border-radius: 1rem;
            padding: 5px 8px;
            border: 1px solid cyan;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .slot-info {
            font-size: 0.55rem;
            font-family: monospace;
            color: #aaf;
            flex: 1;
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
        }
        .slot-actions {
            display: flex;
            gap: 5px;
        }
        .slot-btn {
            background: #1f2a44;
            border: none;
            border-radius: 30px;
            padding: 2px 6px;
            font-size: 0.6rem;
            font-weight: bold;
            color: cyan;
            cursor: pointer;
        }
        .slot-btn.delete-btn {
            background: #4a1f2a;
            color: #ff8a8a;
        }
        .slot-btn.delete-btn:active { background: #ff3333; color: black; }
        .slot-btn:active { transform: scale(0.96); background: cyan; color: black; }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin: 8px 0 5px;
        }
        .btn-icon {
            background: linear-gradient(105deg, #14223b, #070c1a);
            border: none;
            color: #bff0ff;
            flex: 1;
            padding: 5px 0;
            font-weight: bold;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.65rem;
            border: 1px solid cyan;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: 0.05s linear;
        }
        .btn-icon:active { transform: translateY(1px); background: #2a3f7e; }
        .btn-newgame {
            background: linear-gradient(95deg, #2a3f7e, #111b33);
            width: 100%;
            padding: 7px 0;
            font-weight: bold;
            border-radius: 2rem;
            border: none;
            color: #eef5ff;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 5px;
            font-family: 'Orbitron', monospace;
        }
        .draw-btn {
            background: linear-gradient(95deg, #7e2a6e, #331b3a);
            margin-top: 5px;
            width: 100%;
            border: 1px solid #ff66cc;
        }
        .game-status {
            background: #000000aa;
            border-radius: 1.5rem;
            padding: 5px;
            text-align: center;
            font-size: 0.6rem;
            margin-top: 8px;
            border: 1px solid cyan;
            color: #b3ffff;
        }

        @media (max-width: 780px) {
            .info-panel { width: 310px; padding: 0.8rem; }
            .avatar { width: 40px; height: 40px; font-size: 1.6rem; }
            .timer { font-size: 1.3rem; }
            .move-history { max-height: 70px; }
        }
    </style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="flash-overlay" id="flashOverlay"></div>
<div class="game-container">
    <div class="chess-wrapper">
        <div class="board-area">
            <canvas id="chessCanvas" width="630" height="700"></canvas>
            <div class="flip-btn" id="flipBoardBtn">⟳ 矩阵翻转 ⟳</div>
        </div>
        <div class="info-panel">
            <div class="timer-card" id="redTimerCard">
                <div class="avatar-area" id="redAvatarArea">
                    <div class="avatar" id="redAvatar">👾</div>
                </div>
                <div class="player-info">
                    <div class="player-name">
                        <span id="redNameDisplay" class="red-name">Raininheart</span>
                        <div class="edit-icon" id="editRedName">✎</div>
                    </div>
                    <div class="timer" id="redTimerDisplay">20:00</div>
                </div>
            </div>
            <div class="timer-card" id="blackTimerCard">
                <div class="avatar-area" id="blackAvatarArea">
                    <div class="avatar" id="blackAvatar">🤖</div>
                </div>
                <div class="player-info">
                    <div class="player-name">
                        <span id="blackNameDisplay" class="black-name">Rainruin</span>
                        <div class="edit-icon" id="editBlackName">✎</div>
                    </div>
                    <div class="timer" id="blackTimerDisplay">20:00</div>
                </div>
            </div>
            
            <div class="turn-indicator">
                <span>⚡ 执行指令 ⚡</span>
                <span class="turn-badge" id="turnBadge">红方回合</span>
            </div>
            
            <div class="winrate-section">
                <div class="progress-bar-bg">
                    <div class="progress-fill" id="winrateFill" style="width: 50%;"></div>
                </div>
                <div class="winrate-text" id="winrateText">胜率预测 · 均衡协议 50% : 50%</div>
            </div>

            <div class="move-history">
                <div class="history-title">📟 对局记录</div>
                <div class="history-list" id="moveHistoryList">等待走子...</div>
            </div>

            <div class="save-slots" id="saveSlots"></div>

            <div class="action-buttons">
                <button class="btn-icon" id="resetGameBtn">⚡ 新战局</button>
            </div>
            <button class="btn-icon draw-btn" id="drawBtn">🤝 提议和棋</button>
            <div class="game-status" id="gameStatusMsg">
                红方先导 · 触碰棋子启程 | 点击「AI参谋」获得决策建议
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ========== 核心变量 ==========
        const canvas = document.getElementById('chessCanvas');
        const ctx = canvas.getContext('2d');
        let boardFlipped = false;
        let cellW = 630/9, cellH = 700/10;
        let offsetX = cellW/2, offsetY = cellH/2;
        
        // 棋子价值表
        const PIECE_VALUE = {
            'r车': 950, 'r马': 450, 'r炮': 450, 'r相': 200, 'r士': 200, 'r兵': 130, 'r帅': 1000000,
            'b车': 950, 'b马': 450, 'b炮': 450, 'b象': 200, 'b士': 200, 'b卒': 130, 'b将': 1000000
        };
        
        const POS_BONUS = {
            'r兵': (y) => y <= 4 ? 0 : 50,
            'b卒': (y) => y >= 5 ? 0 : 50,
            'r马': (x,y) => (x>=2 && x<=6 && y>=3 && y<=6) ? 35 : ((x===1||x===7) && y>=2 && y<=7 ? 15 : 0),
            'b马': (x,y) => (x>=2 && x<=6 && y>=3 && y<=6) ? 35 : ((x===1||x===7) && y>=2 && y<=7 ? 15 : 0),
            'r炮': (x,y) => (x>=2 && x<=6 && y>=3 && y<=6) ? 25 : 0,
            'b炮': (x,y) => (x>=2 && x<=6 && y>=3 && y<=6) ? 25 : 0,
            'r车': (x,y) => (y === 4 || y === 5) ? 40 : ((x===0||x===8) && y>=3 && y<=6 ? 15 : 0),
            'b车': (x,y) => (y === 4 || y === 5) ? 40 : ((x===0||x===8) && y>=3 && y<=6 ? 15 : 0),
            'r帅': (x,y) => (x===4 && y===9) ? 25 : ((x>=3&&x<=5 && y>=7) ? 15 : 0),
            'b将': (x,y) => (x===4 && y===0) ? 25 : ((x>=3&&x<=5 && y<=2) ? 15 : 0)
        };
        
        let board = Array(9).fill().map(() => Array(10).fill(null));
        let turn = 'r';
        let gameActive = true;
        let winner = null;
        let redTime = 20 * 60;
        let blackTime = 20 * 60;
        let timerInterval = null;
        let currentTimingPlayer = 'r';
        
        let selectedX = null, selectedY = null;
        let validMoves = [];
        let historyStack = [];
        let particles = [];
        let maxParticles = 50;
        let moveHistory = [];
        let lightTrail = null;
        
        let redPlayerName = "Raininheart";
        let blackPlayerName = "Rainruin";
        let redAvatar = "👾";
        let blackAvatar = "🤖";
        
        let drawOfferPending = false;
        let drawOfferedBy = null;
        
        // DOM 元素
        const redTimerDisplay = document.getElementById('redTimerDisplay');
        const blackTimerDisplay = document.getElementById('blackTimerDisplay');
        const turnBadge = document.getElementById('turnBadge');
        const gameStatusMsg = document.getElementById('gameStatusMsg');
        const winrateFill = document.getElementById('winrateFill');
        const winrateText = document.getElementById('winrateText');
        const redNameSpan = document.getElementById('redNameDisplay');
        const blackNameSpan = document.getElementById('blackNameDisplay');
        const redAvatarDiv = document.getElementById('redAvatar');
        const blackAvatarDiv = document.getElementById('blackAvatar');
        const flashOverlay = document.getElementById('flashOverlay');
        const drawBtn = document.getElementById('drawBtn');
        const moveHistoryList = document.getElementById('moveHistoryList');
        
        // ========== 辅助函数 ==========
        function copyBoard(source) {
            let nb = Array(9).fill().map(()=>Array(10).fill(null));
            for(let i=0;i<9;i++) for(let j=0;j<10;j++) nb[i][j]=source[i][j];
            return nb;
        }
        
        function getPieceSide(p) { return p ? p[0] : null; }
        function getPieceChar(piece) {
            const map = {'r车':'車','r马':'馬','r炮':'炮','r相':'相','r士':'士','r兵':'兵','r帅':'帥',
                         'b车':'車','b马':'馬','b炮':'炮','b象':'象','b士':'士','b卒':'卒','b将':'將'};
            return map[piece] || '';
        }
        
        function isValidBasicMove(piece, fx, fy, tx, ty, boardState) {
            const target = boardState[tx][ty];
            if(target && getPieceSide(target)===getPieceSide(piece)) return false;
            const dx=tx-fx, dy=ty-fy, adx=Math.abs(dx), ady=Math.abs(dy);
            switch(piece){
                case 'r帅': case 'b将':
                    if((adx+ady===1) && tx>=3 && tx<=5 && ((piece[0]=='r' && ty>=7 && ty<=9) || (piece[0]=='b' && ty>=0 && ty<=2))) return true;
                    return false;
                case 'r士': case 'b士':
                    if(adx===1 && ady===1 && ((piece[0]=='r' && ty>=7 && ty<=9 && tx>=3 && tx<=5) || (piece[0]=='b' && ty>=0 && ty<=2 && tx>=3 && tx<=5))) return true;
                    return false;
                case 'r相': case 'b象':
                    if(adx===2 && ady===2){
                        let mx=(fx+tx)/2, my=(fy+ty)/2;
                        if(boardState[mx][my] !== null) return false;
                        if(piece[0]=='r' && ty>=5) return true;
                        if(piece[0]=='b' && ty<=4) return true;
                    } return false;
                case 'r马': case 'b马':
                    if(adx===2 && ady===1){
                        let legX = fx + dx/2, legY = fy;
                        if(boardState[legX][legY]===null) return true;
                    } else if(adx===1 && ady===2){
                        let legX = fx, legY = fy + dy/2;
                        if(boardState[legX][legY]===null) return true;
                    } return false;
                case 'r车': case 'b车':
                    if(fx===tx){
                        let step = (ty>fy)?1:-1;
                        for(let y=fy+step; y!==ty; y+=step) if(boardState[tx][y]!==null) return false;
                        return true;
                    } else if(fy===ty){
                        let step = (tx>fx)?1:-1;
                        for(let x=fx+step; x!==tx; x+=step) if(boardState[x][ty]!==null) return false;
                        return true;
                    } return false;
                case 'r炮': case 'b炮':
                    let cnt=0;
                    if(fx===tx){
                        let step=(ty>fy)?1:-1;
                        for(let y=fy+step; y!==ty; y+=step) if(boardState[tx][y]!==null) cnt++;
                    } else if(fy===ty){
                        let step=(tx>fx)?1:-1;
                        for(let x=fx+step; x!==tx; x+=step) if(boardState[x][ty]!==null) cnt++;
                    } else return false;
                    if(target && cnt===1) return true;
                    if(!target && cnt===0) return true;
                    return false;
                case 'r兵': case 'b卒':
                    const forward = (piece[0]=='r') ? -1 : 1;
                    const overRiver = (piece[0]=='r') ? (fy <= 4) : (fy >= 5);
                    if(dx===0 && dy===forward) return true;
                    if(overRiver && (adx===1 && dy===0)) return true;
                    return false;
                default: return false;
            }
        }
        
        function isSquareAttacked(boardState, x, y, attackerSide){
            for(let i=0;i<9;i++) for(let j=0;j<10;j++){
                let p=boardState[i][j];
                if(p && getPieceSide(p)===attackerSide && isValidBasicMove(p,i,j,x,y,boardState)) return true;
            } return false;
        }
        function isFlyingKing(boardState){
            let rk=null,bk=null;
            for(let i=0;i<9;i++) for(let j=0;j<10;j++){ if(boardState[i][j]==='r帅') rk=[i,j]; if(boardState[i][j]==='b将') bk=[i,j];}
            if(!rk||!bk) return false;
            if(rk[0]!==bk[0]) return false;
            let y1=Math.min(rk[1],bk[1]), y2=Math.max(rk[1],bk[1]);
            for(let y=y1+1; y<y2; y++) if(boardState[rk[0]][y]!==null) return false;
            return true;
        }
        function isLegalMove(piece, fx, fy, tx, ty, boardState, side){
            let clone = copyBoard(boardState);
            clone[tx][ty]=clone[fx][fy];
            clone[fx][fy]=null;
            let kingType = (side==='r')?'r帅':'b将';
            let kingPos=null;
            for(let i=0;i<9;i++) for(let j=0;j<10;j++) if(clone[i][j]===kingType) kingPos=[i,j];
            if(!kingPos) return false;
            if(isSquareAttacked(clone, kingPos[0], kingPos[1], side==='r'?'b':'r')) return false;
            if(isFlyingKing(clone)) return false;
            return true;
        }
        
        function getValidMovesForPiece(x,y,boardState,side){
            let p=boardState[x][y];
            if(!p || getPieceSide(p)!==side) return [];
            let moves=[];
            for(let i=0;i<9;i++) for(let j=0;j<10;j++){
                if(isValidBasicMove(p,x,y,i,j,boardState) && isLegalMove(p,x,y,i,j,boardState,side)){
                    moves.push({x:i,y:j});
                }
            } return moves;
        }
        
        function isCheckmated(side, boardState){
            for(let i=0;i<9;i++) for(let j=0;j<10;j++){
                let p=boardState[i][j];
                if(p && getPieceSide(p)===side && getValidMovesForPiece(i,j,boardState,side).length>0) return false;
            } return true;
        }
        
        function findKingPos(side, boardState) {
            let target = (side === 'r') ? 'r帅' : 'b将';
            for(let i=0;i<9;i++) for(let j=0;j<10;j++) if(boardState[i][j] === target) return [i,j];
            return null;
        }
        
        // 局面评估
        function evaluateBoard(boardState) {
            let score = 0;
            for(let i=0;i<9;i++) {
                for(let j=0;j<10;j++) {
                    let p = boardState[i][j];
                    if(p) {
                        let val = PIECE_VALUE[p];
                        if(POS_BONUS[p]) val += POS_BONUS[p](i,j);
                        score += (p[0] === 'r') ? val : -val;
                    }
                }
            }
            return score;
        }
        
        function getAllMovesForSide(boardState, side) {
            let moves = [];
            for(let i=0;i<9;i++) for(let j=0;j<10;j++) {
                let p = boardState[i][j];
                if(p && p[0] === side) {
                    let pieceMoves = getValidMovesForPiece(i,j,boardState,side);
                    for(let mv of pieceMoves) moves.push({fromX:i, fromY:j, toX:mv.x, toY:mv.y});
                }
            }
            return moves;
        }
        
        function getBestMoveByGreedy() {
            if(!gameActive) return null;
            let moves = getAllMovesForSide(board, turn);
            if(moves.length === 0) return null;
            let bestScore = -Infinity;
            let bestMove = null;
            for(let mv of moves) {
                let captured = board[mv.toX][mv.toY];
                let originalTarget = board[mv.toX][mv.toY];
                board[mv.toX][mv.toY] = board[mv.fromX][mv.fromY];
                board[mv.fromX][mv.fromY] = null;
                let score = evaluateBoard(board);
                if(turn === 'b') score = -score;
                if(captured) score += (PIECE_VALUE[captured] || 0) * 1.5;
                let oppKing = findKingPos(turn === 'r' ? 'b' : 'r', board);
                if(oppKing && isSquareAttacked(board, oppKing[0], oppKing[1], turn)) score += 250;
                if((mv.toX>=3 && mv.toX<=5) && (mv.toY>=4 && mv.toY<=5)) score += 30;
                if(score > bestScore) {
                    bestScore = score;
                    bestMove = mv;
                }
                board[mv.fromX][mv.fromY] = board[mv.toX][mv.toY];
                board[mv.toX][mv.toY] = originalTarget;
            }
            return bestMove;
        }
        
        function smartHint() {
            if(!gameActive) { gameStatusMsg.innerText = "对局已终结，无法提供决策"; return; }
            let best = getBestMoveByGreedy();
            if(!best) { gameStatusMsg.innerText = "无合法步数建议"; return; }
            selectedX = best.fromX;
            selectedY = best.fromY;
            validMoves = getValidMovesForPiece(selectedX, selectedY, board, turn);
            drawBoardAndPieces();
            let fromCoord = `${String.fromCharCode(97+best.fromX)}${10-best.fromY}`;
            let toCoord = `${String.fromCharCode(97+best.toX)}${10-best.toY}`;
            let pieceChar = getPieceChar(board[best.fromX][best.fromY]);
            gameStatusMsg.innerHTML = `🧠 AI参谋决策: 推荐 ${pieceChar} 从 ${fromCoord} → ${toCoord} (动态评估)`;
            let {x:dx, y:dy} = transformCoord(selectedX, selectedY);
            let cx = offsetX + dx*cellW, cy = offsetY + dy*cellH;
            addLightTrail(cx, cy, cx, cy);
            setTimeout(()=>{ if(gameActive && !winner) gameStatusMsg.innerText = `${turn==='r'?redPlayerName:blackPlayerName} 请走子`; }, 2800);
        }
        
        // 特效函数
        function addShockEffect(x, y) {

            let newCount = Math.min(28, maxParticles - particles.length);

                const angle = Math.random() * Math.PI * 2;
                const speed = 2.5 + Math.random() * 8;
                particles.push({
                    x: x, y: y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
                    life: 1.0, size: 3+Math.random()*6, color: `hsl(${Math.random()*60+180}, 100%, 65%)`
                });

        }
        
        function addLightTrail(fx, fy, tx, ty) {
            lightTrail = { fromX: fx, fromY: fy, toX: tx, toY: ty, alpha: 1.0 };
        }
        
        function updateTrail() {
            if(lightTrail) {
                lightTrail.alpha -= 0.1;
                if(lightTrail.alpha <= 0) lightTrail = null;
                else drawBoardAndPieces();

        }
        
        function drawLightTrail() {
            if(!lightTrail) return;
            ctx.save();
            ctx.globalAlpha = lightTrail.alpha * 0.8;
            ctx.beginPath(); ctx.moveTo(lightTrail.fromX, lightTrail.fromY); ctx.lineTo(lightTrail.toX, lightTrail.toY);
            ctx.strokeStyle = '#0ff'; ctx.lineWidth = 5; ctx.shadowBlur = 12; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(lightTrail.fromX, lightTrail.fromY); ctx.lineTo(lightTrail.toX, lightTrail.toY);
            ctx.strokeStyle = '#ff44cc'; ctx.lineWidth = 2.5; ctx.stroke();

        }
        
        function updateParticles() {
            if(particles.length === 0) return;
            for(let i=particles.length-1; i>=0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life -= 0.035;
                if(particles[i].life <= 0) particles.splice(i,1);
            }
            drawBoardAndPieces();

                ctx.beginPath(); ctx.arc(p.x, p.y, p.size*(0.5+p.life*0.5), 0, Math.PI*2);

        function addMoveRecord(fx,fy,tx,ty,piece,captured){
            let desc = `${piece[0]==='r'?redPlayerName:blackPlayerName} ${getPieceChar(piece)} ${String.fromCharCode(97+fx)}${10-fy} → ${String.fromCharCode(97+tx)}${10-ty}`;

        function tryMove(fx,fy,tx,ty){
            if(!gameActive) return false;
            let piece=board[fx][fy];
            if(!piece || getPieceSide(piece)!==turn) return false;
            let moves=getValidMovesForPiece(fx,fy,board,turn);
            let ok=moves.some(m=>m.x===tx && m.y===ty);
            if(!ok) return false;
            let captured = board[tx][ty];
            pushHistory();
            addMoveRecord(fx,fy,tx,ty,piece,captured);
            board[tx][ty]=board[fx][fy];
            board[fx][fy]=null;
            let {x:fromX, y:fromY} = transformCoord(fx,fy);
            let {x:toX, y:toY} = transformCoord(tx,ty);
            let cxFrom = offsetX+fromX*cellW, cyFrom=offsetY+fromY*cellH;
            let cxTo = offsetX+toX*cellW, cyTo=offsetY+toY*cellH;
            addLightTrail(cxFrom,cyFrom,cxTo,cyTo);
            if(captured) { addShockEffect(cxTo,cyTo); gameStatusMsg.innerHTML=`💥 骇入爆裂！${captured[0]==='r'?redPlayerName:blackPlayerName} 棋子被瓦解 💥`; }
            let nextTurn = (turn==='r')?'b':'r';
            let gameOver = isCheckmated(nextTurn, board);
            if(gameOver){
                gameActive=false; winner=turn; stopTimer(); celebrateFireworks();
                gameStatusMsg.innerText=`${winner==='r'?redPlayerName:blackPlayerName} 胜利·将死`;
            }
            let kingPos = findKingPos(nextTurn, board);
            if(kingPos && isSquareAttacked(board, kingPos[0], kingPos[1], turn)){
                addCheckPulse();
                gameStatusMsg.innerHTML=`⚠️ 将军 ⚠️ ${nextTurn==='r'?redPlayerName:blackPlayerName} 受击`;
                if(!gameOver) setTimeout(()=>{ if(gameActive && !winner) gameStatusMsg.innerText=`${turn==='r'?redPlayerName:blackPlayerName} 走子`; },1000);
            } else if(!gameOver) gameStatusMsg.innerText=`${nextTurn==='r'?redPlayerName:blackPlayerName} 请走子`;
            if(!gameOver){ turn=nextTurn; updateTurnDisplay(); switchTimer(turn); }
            else updateTurnDisplay(true);
            drawOfferPending=false; drawOfferedBy=null; drawBtn.innerText="🤝 提议和棋";
            drawBoardAndPieces();
            updateWinratePrediction();
            clearSelected();
            return true;
        }
        
        // 计时器

        function updateTimerCardActive(s){ let rc=document.getElementById('redTimerCard'), bc=document.getElementById('blackTimerCard'); if(s==='r'){ rc.classList.add('active'); bc.classList.remove('active'); }else{ bc.classList.add('active'); rc.classList.remove('active'); } }

                grad.addColorStop(0.8, 'rgba(0,255,255,0)');

            // 棋子呼吸光晕 (围绕棋子)

            ctx.shadowBlur=0;

        function clearSelected(){ selectedX=null; selectedY=null; validMoves=[]; }
        
        function resetFullGame(){

        function proposeDraw(){

            if(drawOfferPending){
                if(drawOfferedBy===turn) gameStatusMsg.innerText="你已经提议过和棋，请等待对方回应";
                else{
                    gameActive=false; winner=null; stopTimer();
                    gameStatusMsg.innerText="🤝 双方同意和棋！游戏结束 🤝";
                    turnBadge.innerText="🏁 和棋"; drawOfferPending=false; drawOfferedBy=null; drawBtn.innerText="🤝 提议和棋";
                    celebrateFireworks(); drawBoardAndPieces(); updateWinratePrediction();
                }
                return;
            }
            drawOfferPending=true; drawOfferedBy=turn;
            gameStatusMsg.innerText=`${turn==='r'?redPlayerName:blackPlayerName} 提议和棋，请对方点击「同意和棋」按钮`;
            drawBtn.innerText="✅ 同意和棋";
        }
        
        // 存档系统
        const SLOT_KEYS=['chess_save_slot1','chess_save_slot2','chess_save_slot3'];
        function getSaveData(){ return { board: copyBoard(board), turn, redTime, blackTime, gameActive, winner, redPlayerName, blackPlayerName, boardFlipped, redAvatar, blackAvatar, moveHistory, saveTime: new Date().toLocaleString() }; }
        function loadSaveData(d){ if(!d) return; board=copyBoard(d.board); turn=d.turn; redTime=d.redTime; blackTime=d.blackTime; gameActive=d.gameActive; winner=d.winner; redPlayerName=d.redPlayerName; blackPlayerName=d.blackPlayerName; boardFlipped=d.boardFlipped||false; if(d.redAvatar) redAvatar=d.redAvatar; if(d.blackAvatar) blackAvatar=d.blackAvatar; if(d.moveHistory) moveHistory=d.moveHistory; else moveHistory=[]; redNameSpan.innerText=redPlayerName; blackNameSpan.innerText=blackPlayerName; redAvatarDiv.innerText=redAvatar; blackAvatarDiv.innerText=blackAvatar; updateMoveHistoryUI(); drawOfferPending=false; stopTimer(); if(gameActive && !winner) startTimer(turn); currentTimingPlayer=turn; updateTimerCardActive(turn); updateTimerDisplay(); clearSelected(); drawBoardAndPieces(); updateWinratePrediction(); updateTurnDisplay(!gameActive); gameStatusMsg.innerText=`📀 读取存档 (${d.saveTime||'未知'})`; }
        function saveToSlot(idx){ localStorage.setItem(SLOT_KEYS[idx], JSON.stringify(getSaveData())); gameStatusMsg.innerText=`💾 已存入存档槽 ${idx+1}`; updateSlotInfoUI(); }
        function loadFromSlot(idx){ let raw=localStorage.getItem(SLOT_KEYS[idx]); if(raw) try{ loadSaveData(JSON.parse(raw)); } catch(e){} else gameStatusMsg.innerText=`❌ 存档槽 ${idx+1} 为空`; }
        function deleteSlot(idx){ localStorage.removeItem(SLOT_KEYS[idx]); gameStatusMsg.innerText=`🗑️ 已删除存档槽 ${idx+1}`; updateSlotInfoUI(); }
        function updateSlotInfoUI(){ for(let i=0;i<3;i++){ let info=document.getElementById(`slotInfo${i}`); if(info){ let raw=localStorage.getItem(SLOT_KEYS[i]); if(raw) try{ let d=JSON.parse(raw); info.innerText=`${d.redPlayerName} vs ${d.blackPlayerName} ${d.saveTime||''}`; }catch(e){ info.innerText="损坏"; } else info.innerText="空存档槽"; } } }
        function buildSlotUI(){ let cont=document.getElementById('saveSlots'); cont.innerHTML=''; for(let i=0;i<3;i++){ let div=document.createElement('div'); div.className='slot-card'; div.innerHTML=`<div class="slot-info" id="slotInfo${i}">空存档槽</div><div class="slot-actions"><button class="slot-btn" data-slot="${i}" data-action="save">💾存</button><button class="slot-btn" data-slot="${i}" data-action="load">📂读</button><button class="slot-btn delete-btn" data-slot="${i}" data-action="delete">🗑️删</button></div>`; cont.appendChild(div); } cont.addEventListener('click',(e)=>{ let btn=e.target.closest('.slot-btn'); if(btn){ let slot=parseInt(btn.dataset.slot); let act=btn.dataset.action; if(act==='save') saveToSlot(slot); else if(act==='load') loadFromSlot(slot); else if(act==='delete') deleteSlot(slot); } }); updateSlotInfoUI(); }
        
        // 头像菜单
        const avatarOptions=["👾","🤖","👨‍🚀","🦾","🧠","🔥","💀","⚡","🎭","🌀"];
        let activeMenu=null;
        function showAvatarMenu(side,target){
            if(activeMenu) activeMenu.remove();
            let menu=document.createElement('div'); menu.className='avatar-menu';
            avatarOptions.forEach(em=>{ let opt=document.createElement('div'); opt.className='avatar-option'; opt.innerText=em; opt.onclick=(e)=>{ e.stopPropagation(); if(side==='r'){ redAvatar=em; redAvatarDiv.innerText=redAvatar; }else{ blackAvatar=em; blackAvatarDiv.innerText=blackAvatar; } menu.remove(); activeMenu=null; savePrefs(); }; menu.appendChild(opt); });
            let rect=target.getBoundingClientRect(); menu.style.position='absolute'; menu.style.left=rect.left+'px'; menu.style.top=(rect.bottom+5)+'px'; document.body.appendChild(menu); activeMenu=menu;
            let close=(e)=>{ if(menu && !menu.contains(e.target)){ menu.remove(); activeMenu=null; document.removeEventListener('click',close); } }; setTimeout(()=>document.addEventListener('click',close),10);
        }
        
        // 画布交互
        function getGridFromCoord(clientX, clientY){
            let rect=canvas.getBoundingClientRect(), scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
            let canvasX=(clientX-rect.left)*scaleX, canvasY=(clientY-rect.top)*scaleY;
            let gx=Math.round((canvasX-offsetX)/cellW), gy=Math.round((canvasY-offsetY)/cellH);
            if(gx<0||gx>=9||gy<0||gy>=10) return null;
            if(boardFlipped) return {x:8-gx, y:9-gy};
            return {x:gx, y:gy};
        }
        
        function onCanvasClick(e){
            if(!gameActive) return;
            e.preventDefault();
            let clientX, clientY;
            if(e.touches){ clientX=e.touches[0].clientX; clientY=e.touches[0].clientY; }
            else{ clientX=e.clientX; clientY=e.clientY; }
            let coord=getGridFromCoord(clientX,clientY);
            if(!coord) return;
            let {x:gx, y:gy}=coord;
            if(selectedX===null){
                let piece=board[gx][gy];
                if(piece && getPieceSide(piece)===turn){
                    selectedX=gx; selectedY=gy;
                    validMoves=getValidMovesForPiece(gx,gy,board,turn);
                    drawBoardAndPieces();
                }else{ clearSelected(); drawBoardAndPieces(); }
            }else{
                let success=tryMove(selectedX,selectedY,gx,gy);
                clearSelected(); drawBoardAndPieces();
                if(!success && board[gx][gy] && getPieceSide(board[gx][gy])===turn){
                    selectedX=gx; selectedY=gy;
                    validMoves=getValidMovesForPiece(gx,gy,board,turn);
                    drawBoardAndPieces();
                }
            }
        }
        
        function savePrefs(){ localStorage.setItem('chess_player_prefs', JSON.stringify({red:redPlayerName, black:blackPlayerName, redAvatar, blackAvatar})); }
        function loadPrefs(){ let s=localStorage.getItem('chess_player_prefs'); if(s) try{ let p=JSON.parse(s); if(p.red) redPlayerName=p.red; if(p.black) blackPlayerName=p.black; if(p.redAvatar) redAvatar=p.redAvatar; if(p.blackAvatar) blackAvatar=p.blackAvatar; redNameSpan.innerText=redPlayerName; blackNameSpan.innerText=blackPlayerName; redAvatarDiv.innerText=redAvatar; blackAvatarDiv.innerText=blackAvatar; }catch(e){} }
        
        canvas.addEventListener('click',onCanvasClick);
        canvas.addEventListener('touchstart',e=>{ e.preventDefault(); onCanvasClick(e); },{passive:false});
        document.getElementById('resetGameBtn').addEventListener('click',resetFullGame);
        document.getElementById('undoMoveBtn').addEventListener('click',undoLastMove);
        document.getElementById('smartHintBtn').addEventListener('click',smartHint);
        drawBtn.addEventListener('click',proposeDraw);
        document.getElementById('editRedName').addEventListener('click',()=>{ let n=prompt("输入红方代号",redPlayerName); if(n&&n.trim()){ redPlayerName=n.trim(); redNameSpan.innerText=redPlayerName; updateWinratePrediction(); updateTurnDisplay(); savePrefs(); } });
        document.getElementById('editBlackName').addEventListener('click',()=>{ let n=prompt("输入黑方代号",blackPlayerName); if(n&&n.trim()){ blackPlayerName=n.trim(); blackNameSpan.innerText=blackPlayerName; updateWinratePrediction(); updateTurnDisplay(); savePrefs(); } });
        document.getElementById('flipBoardBtn').addEventListener('click',()=>{ boardFlipped=!boardFlipped; drawBoardAndPieces(); });
        document.getElementById('redAvatarArea').addEventListener('click',e=>{ e.stopPropagation(); showAvatarMenu('r',redAvatarDiv); });
        document.getElementById('blackAvatarArea').addEventListener('click',e=>{ e.stopPropagation(); showAvatarMenu('b',blackAvatarDiv); });
        
        window.addEventListener('beforeunload',()=>{ savePrefs(); });
        setInterval(()=>{ if(particles.length || lightTrail) { updateParticles(); updateTrail(); } }, 50);
        // 呼吸特效重绘
        setInterval(()=>{ drawBoardAndPieces(); }, 100);
        
        // 动态背景粒子
        for(let i=0;i<60;i++){ let p=document.createElement('div'); p.className='floating-particle'; p.style.left=Math.random()*100+'%'; p.style.animationDelay=Math.random()*20+'s'; p.style.animationDuration=8+Math.random()*12+'s'; document.body.appendChild(p); }
        
        initBoardData();
        loadPrefs();
        buildSlotUI();
        resetFullGame();
    })();
</script>
</body>
</html>
